name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: |
          cd coin_conquer
          flutter pub get

      - name: Install CocoaPods
        run: |
          cd coin_conquer/ios
          pod install --repo-update || pod install

      - name: Build unsigned iOS app with xcodebuild
        run: |
          cd coin_conquer/ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -quiet

      - name: Create unsigned IPA
        run: |
          cd coin_conquer
          APP_PATH="ios/build/Debug-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find ios/build -name "Runner.app" -type d | head -1)
          fi
          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q coin_conquer.ipa Payload/
          rm -rf Payload
          echo "IPA created: $(ls -lh coin_conquer.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CoinConquer-iOS
          path: coin_conquer/coin_conquer.ipa
          retention-days: 90

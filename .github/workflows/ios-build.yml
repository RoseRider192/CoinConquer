name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Install Flutter deps
        working-directory: coin_conquer
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          if ! command -v pod &> /dev/null; then
            brew install cocoapods
          fi
          pod --version

      - name: Pod install
        working-directory: coin_conquer/ios
        run: pod install

      - name: Build iOS
        working-directory: coin_conquer
        run: flutter build ios --debug --no-codesign

      - name: Locate built app
        working-directory: coin_conquer
        run: find . -path "*/Runner.app" -type d

      - name: Create IPA
        working-directory: coin_conquer
        run: |
          mkdir -p Payload
          APP_DIR=$(find . -path "*/Runner.app" -type d | head -1)
          echo "Using: $APP_DIR"
          cp -r "$APP_DIR" Payload/
          zip -r -q coin_conquer.ipa Payload/
          ls -lh coin_conquer.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: CoinConquer-iOS
          path: coin_conquer/coin_conquer.ipa
          retention-days: 90
